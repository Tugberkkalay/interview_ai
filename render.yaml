services:
  # Django Backend Web Service
  - type: web
    name: interview-backend
    env: python
    region: frankfurt  # veya oregon, singapore, mumbai, sydney
    plan: free  # Free tier: 750 saat/ay, 15 dakika inactivity sonrası sleep
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env 2>/dev/null || export PATH="$HOME/.local/bin:/opt/render/.local/bin:$PATH" && cd backend && uv sync && uv run python manage.py migrate --noinput && uv run python manage.py create_default_prompts --noinput || true && uv run python manage.py create_admin_user || true && uv run python manage.py collectstatic --noinput
    startCommand: (command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh) && export PATH="$HOME/.local/bin:/opt/render/.local/bin:$PATH" && cd backend && uv run gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false  # ÖNEMLİ: Render Dashboard → Environment → Add Variable → GEMINI_API_KEY ekleyin
      - key: DATABASE_URL
        fromDatabase:
          name: interview-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: interview-backend-zb9b.onrender.com  # Gerçek backend URL
      - key: CORS_ALLOWED_ORIGINS
        value: https://interview-frontend.onrender.com  # Frontend deploy sonrası gerçek URL'i buraya yazın
      - key: SESSION_COOKIE_SECURE
        value: True
      - key: CSRF_COOKIE_SECURE
        value: True
      - key: SECURE_SSL_REDIRECT
        value: True
      - key: CREATE_ADMIN_USER
        value: true  # İlk deploy için true, sonra false yapabilirsiniz veya silebilirsiniz

  # React Frontend Static Site
  - type: web
    name: interview-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://interview-backend-zb9b.onrender.com/api  # Gerçek backend URL

databases:
  # PostgreSQL Database
  - name: interview-db
    databaseName: interview_db
    user: interview_user
    plan: free  # Free tier: 90 gün sonra silinir, production için starter önerilir
    region: frankfurt  # Database ile web service aynı region'da olmalı

