services:
  # Django Backend Web Service
  - type: web
    name: interview-backend
    env: python
    region: frankfurt  # veya oregon, singapore, mumbai, sydney
    plan: starter  # veya free, standard, pro
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH="$HOME/.cargo/bin:$PATH" && cd backend && uv sync && uv run python manage.py collectstatic --noinput
    startCommand: export PATH="$HOME/.cargo/bin:$PATH" && cd backend && uv run gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false  # Render dashboard'dan manuel ekleyin
      - key: DATABASE_URL
        fromDatabase:
          name: interview-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: interview-backend.onrender.com  # Render URL'inizi buraya ekleyin
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.pages.dev  # Frontend URL'inizi buraya ekleyin
      - key: SESSION_COOKIE_SECURE
        value: True
      - key: CSRF_COOKIE_SECURE
        value: True
      - key: SECURE_SSL_REDIRECT
        value: True

databases:
  # PostgreSQL Database
  - name: interview-db
    databaseName: interview_db
    user: interview_user
    plan: starter  # veya free, standard, pro
    region: frankfurt  # Database ile web service aynı region'da olmalı

